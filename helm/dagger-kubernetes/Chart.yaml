apiVersion: v2
name: dagger-kubernetes
description: Self-hosted, Dagger-Cloud-compatible platform — remote shared cache, auto-scaling engine fleets, live pipeline UI, and drop-in CI integration.
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://github.com/disaster/dagger-kubernetes
sources:
  - https://github.com/disaster/dagger-kubernetes
maintainers:
  - name: disaster
keywords:
  - dagger
  - ci
  - cache
  - buildkit
  - kubernetes
dependencies:
  - name: opentelemetry-collector
    version: "0.108.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: tools.otelCollector.enabled
  - name: docker-registry
    alias: registry
    version: "1.9.6"
    repository: https://charts.helm.sh/stable
    condition: tools.registry.enabled
