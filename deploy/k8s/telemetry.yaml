apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: dagger-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-http
              containerPort: 4318
            - name: otlp-grpc
              containerPort: 4317
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: dagger-cache
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-http
      port: 4318
    - name: otlp-grpc
      port: 4317
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: dagger-cache
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"
          grpc:
            endpoint: "0.0.0.0:4317"
    processors:
      batch: {}
    exporters:
      otlphttp/tempo:
        endpoint: "http://tempo:4318"
      loki:
        endpoint: "http://loki:3100/loki/api/v1/push"
      prometheusremotewrite:
        endpoint: "http://victoria:8428/api/v1/write"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/tempo]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria
  namespace: dagger-cache
  labels:
    app: victoria
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria
  template:
    metadata:
      labels:
        app: victoria
    spec:
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:latest
          args:
            - -storageDataPath=/storage
            - -retentionPeriod=30d
          ports:
            - name: http
              containerPort: 8428
          volumeMounts:
            - name: storage
              mountPath: /storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: victoria-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: victoria
  namespace: dagger-cache
spec:
  selector:
    app: victoria
  ports:
    - name: http
      port: 8428
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-pvc
  namespace: dagger-cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
