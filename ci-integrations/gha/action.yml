name: 'dagger-cache'
description: 'Run Dagger with remote shared cache and live pipeline view'
inputs:
  server-url:
    description: 'Dagger Cache server URL'
    required: true
  token:
    description: 'Dagger Cloud token'
    required: true
  ui-url:
    description: 'UI URL for trace links'
    required: false
  version:
    description: 'Dagger engine version override'
    required: false
  module:
    description: 'Dagger module to call'
    required: true
  args:
    description: 'Arguments to the Dagger call'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Run Dagger with Cache
      shell: bash
      run: |
        ${GITHUB_ACTION_PATH}/dagger-cache.sh run \
          "${{ inputs.module }}" \
          ${{ inputs.args }}
      env:
        DAGGER_CACHE_SERVER: ${{ inputs.server-url }}
        DAGGER_CACHE_UI: ${{ inputs.ui-url || inputs.server-url }}
        DAGGER_CLOUD_TOKEN: ${{ inputs.token }}
        DAGGER_TAG: ${{ inputs.version }}
