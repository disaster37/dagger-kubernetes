# Supervisor runtime configuration.
#
# Only deployment-specific values are listed here. Every other option falls
# back to the compiled-in defaults in internal/config/config.go. To see the
# full set of options with explanations, copy config.app.yaml.sample to
# config.app.yaml and edit from there.
#
# Any value below can also be overridden by an environment variable using the
# DAGGER_CACHE_ prefix, e.g. DAGGER_CACHE_LOG_LEVEL=debug or
# DAGGER_CACHE_CACHE_BACKEND=s3. Environment variables take precedence over
# this file.

# --- Endpoints & public URLs (set these per deployment) ----------------------
server:
  control_addr: ":8080"        # Hertz HTTPS control API
  data_addr: ":8443"            # mTLS L4 data-plane proxy
  data_hostname: "data.supv.example.com"
  public_url: "https://supv.example.com"
  ui_url: "https://ui.supv.example.com"

# --- Authentication ----------------------------------------------------------
auth:
  internal:
    tokens_file: "/etc/dagger-cache/tokens"   # newline-separated bearer tokens
  oauth:                                       # optional; disabled by default
    enabled: false
    provider: "github"
    client_id: "${OAUTH_CLIENT_ID}"
    client_secret: "${OAUTH_CLIENT_SECRET}"
    redirect_url: "https://ui.supv.example.com/auth/callback"
    allowed_orgs: ["acme"]

# --- Remote shared cache -----------------------------------------------------
cache:
  backend: "registry"               # "registry" (OCI) or "s3"
  registry: "cache.reg/dagger-cache" # OCI repository for BuildKit cache blobs

# --- Allowed Dagger engine versions ------------------------------------------
version:
  floor: "v0.19.0"                          # minimum supported engine
  allowlist: ["0.19", "0.20", "0.21"]       # major.minor prefixes to admit
