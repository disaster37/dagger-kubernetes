name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v)"
        required: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"

  docker:
    name: Build & publish image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dagger-kubernetes
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package & publish Helm chart
    runs-on: ubuntu-latest
    needs: [meta, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Update chart appVersion
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${{ needs.meta.outputs.version }}\"/" helm/dagger-kubernetes/Chart.yaml
      - name: Lint
        run: helm lint helm/dagger-kubernetes
      - name: Package
        run: |
          mkdir -p out
          helm dependency update helm/dagger-kubernetes
          helm package helm/dagger-kubernetes --destination out
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart
          path: out/*.tgz
          if-no-files-found: error
      - name: Log in to GHCR (helm)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push chart to GHCR
        run: |
          for pkg in out/*.tgz; do
            helm push "$pkg" "oci://${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/charts"
          done

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, docker, helm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build release binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath -ldflags "-s -w" \
                -o dist/dagger-kubernetes-ci-${os}-${arch} ./cmd/dagger-cache-ci/
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath -ldflags "-s -w" \
                -o dist/supervisor-${os}-${arch} ./cmd/supervisor/
            done
          done
      - uses: actions/download-artifact@v4
        with:
          name: chart
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
